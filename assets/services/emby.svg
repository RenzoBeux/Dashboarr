<?xml version="1.0" encoding="utf-8"?>
<!-- Stylized Emby mark in the Emby brand green (#52B54B). Not the official
     brand asset — an in-app approximation so the service has an icon. -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="emby-green" gradientUnits="userSpaceOnUse" x1="80" y1="80" x2="432" y2="432">
      <stop offset="0" style="stop-color:#6CCB5F"/>
      <stop offset="1" style="stop-color:#3DA235"/>
    </linearGradient>
  </defs>
  <g>
    <!-- Green badge -->
    <circle cx="256" cy="256" r="236" fill="url(#emby-green)"/>
    <!-- White lowercase "e": ring + crossbar, opened at lower-right (mouth) -->
    <circle cx="256" cy="256" r="142" fill="#ffffff"/>
    <circle cx="256" cy="256" r="74" fill="url(#emby-green)"/>
    <rect x="114" y="226" width="284" height="60" fill="#ffffff"/>
    <rect x="250" y="290" width="170" height="130" fill="url(#emby-green)"/>
  </g>
</svg>
